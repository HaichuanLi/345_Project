name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
    types: [opened, synchronize, reopened, ready_for_review]

  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Create google-services.json from secret
        run: echo '${{ secrets.GOOGLE_SERVICES_JSON }}' > app/google-services.json

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 8.7

      - name: Run all tests
        run: ./gradlew test --console=plain

      - name: Print test summary
        if: always()
        shell: bash
        run: |
          set -euo pipefail

          if ! find . -path '*/build/test-results/test/*.xml' -print -quit | grep -q .; then
            echo "TEST SUMMARY: ran=0 passed=0 failed=0 skipped=0"
            exit 0
          fi

          awk '
            /<testsuite / {
              for (i = 1; i <= NF; i++) {
                if ($i ~ /^tests=/) {
                  gsub(/[^0-9]/, "", $i)
                  ran += $i
                }
                if ($i ~ /^failures=/) {
                  gsub(/[^0-9]/, "", $i)
                  failed += $i
                }
                if ($i ~ /^errors=/) {
                  gsub(/[^0-9]/, "", $i)
                  errors += $i
                }
                if ($i ~ /^skipped=/) {
                  gsub(/[^0-9]/, "", $i)
                  skipped += $i
                }
              }
            }
            END {
              total_failed = failed + errors
              passed = ran - total_failed - skipped
              if (passed < 0) passed = 0
              printf("TEST SUMMARY: ran=%d passed=%d failed=%d skipped=%d\n", ran, passed, total_failed, skipped)
            }
          ' $(find . -path '*/build/test-results/test/*.xml')